        .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
        .score-box {
            background: #f8fafc;
            border: 2px solid #e2e8f0;
            padding: 4px 12px;
            border-radius: 8px;
            font-weight: 900;
            min-width: 60px;
            text-align: center;
        }
    </style>
</head>
<body class="bg-neutral-100 text-neutral-900 min-h-screen p-4 md:p-8">

    <div class="max-w-4xl mx-auto space-y-6">
        
        <!-- Header -->
        <header class="bg-white rounded-3xl p-6 shadow-sm border border-neutral-200 flex flex-col md:flex-row md:items-center justify-between gap-6">
            <div class="flex items-center gap-5">
               <div class="w-20 h-20 bg-blue-700 rounded-2xl shadow-lg flex items-center justify-center overflow-hidden border border-blue-800 shrink-0">
                    <img 
                        src="9b6d3082-2c8b-438b-a0ed-5d8300be8bc4.png" 
                        alt="Logo FUTVE 2" 
                        class="w-full h-full object-contain p-1"
                        onerror="this.style.display='none'; this.nextElementSibling.style.display='flex';"
                    >
                </div>
                <div>
                    <h1 class="text-3xl font-black text-neutral-800 tracking-tight leading-none mb-1">FUTVE 2</h1>
                    <p class="text-neutral-500 font-bold text-sm uppercase tracking-widest">Calendario y Resultados 2026</p>
                </div>
            </div>
            <div class="relative group">
                <i data-lucide="search" class="absolute left-4 top-1/2 -translate-y-1/2 text-neutral-400 w-4 h-4 transition-colors"></i>
                <input 
                    type="text" 
                    id="search-input"
                    placeholder="Buscar equipo..." 
                    class="pl-12 pr-6 py-3 bg-neutral-50 border border-neutral-200 rounded-2xl text-sm focus:ring-4 focus:ring-blue-100 focus:bg-white outline-none transition-all w-full md:w-64 font-medium"
                />
            </div>
        </header>

        <!-- Navegación de Jornadas -->
        <div class="space-y-4">
            <div id="jornada-container" class="flex items-center gap-2 overflow-x-auto pb-4 no-scrollbar">
                <!-- Se genera dinámicamente -->
            </div>

            <!-- Filtros de Grupo -->
            <div class="flex flex-wrap items-center gap-2 bg-white p-2 rounded-2xl border border-neutral-200 shadow-sm w-fit" id="filter-container">
                <button onclick="setFilter('Todos')" class="filter-btn px-5 py-2 rounded-xl text-xs font-black uppercase tracking-wider transition-all bg-neutral-800 text-white" data-group="Todos">Todos</button>
                <button onclick="setFilter('Centro-Occidental')" class="filter-btn px-5 py-2 rounded-xl text-xs font-black uppercase tracking-wider transition-all text-neutral-500 hover:bg-neutral-100" data-group="Centro-Occidental">Centro-Occidental</button>
                <button onclick="setFilter('Centro-Oriental')" class="filter-btn px-5 py-2 rounded-xl text-xs font-black uppercase tracking-wider transition-all text-neutral-500 hover:bg-neutral-100" data-group="Centro-Oriental">Centro-Oriental</button>
            </div>
        </div>

        <!-- Lista de Partidos -->
        <div id="matches-list" class="grid gap-3">
            <!-- Se genera dinámicamente -->
        </div>

        <!-- Nota Pie de Página -->
        <div class="p-4 bg-white/50 rounded-2xl border border-neutral-200 text-center">
            <p class="text-[10px] text-neutral-400 font-bold uppercase tracking-widest leading-relaxed">

            </p>
        </div>

        let selectedJornada = 1;
        let filterGroup = 'Todos';
        let searchTerm = '';

        function init() {
            renderJornadas();
            renderMatches();
            lucide.createIcons();

            document.getElementById('search-input').addEventListener('input', (e) => {
                searchTerm = e.target.value.toLowerCase();
                renderMatches();
            });
        }

        function renderJornadas() {
            const container = document.getElementById('jornada-container');
            const jornadas = [...new Set(scheduleData.map(d => d.jornada))].sort((a,b) => a-b);
            
            container.innerHTML = jornadas.map(j => `
                <button onclick="setJornada(${j})" 
                        class="jornada-btn px-5 py-2.5 rounded-xl text-sm font-black whitespace-nowrap transition-all flex flex-col items-center min-w-[90px] ${selectedJornada === j ? 'bg-blue-600 text-white shadow-lg shadow-blue-200 -translate-y-1' : 'bg-white text-neutral-500 border border-neutral-200 hover:border-blue-300'}">
                    <span class="text-[10px] uppercase opacity-60 font-black tracking-tighter">Jornada</span>
                    <span class="text-lg leading-none mt-1">${j}</span>
                </button>
            `).join('');
        }

        function setJornada(j) {
            selectedJornada = j;
            renderJornadas();
            renderMatches();
        }

        function setFilter(group) {
            filterGroup = group;
            document.querySelectorAll('.filter-btn').forEach(btn => {
                if(btn.dataset.group === group) {
                    btn.classList.add('bg-neutral-800', 'text-white');
                    btn.classList.remove('text-neutral-500');
                } else {
                    btn.classList.remove('bg-neutral-800', 'text-white');
                    btn.classList.add('text-neutral-500');
                }
            });
            renderMatches();
        }

        function renderMatches() {
            const list = document.getElementById('matches-list');
            const filtered = scheduleData.filter(m => {
                const matchesJornada = m.jornada === selectedJornada;
                const matchesGroup = filterGroup === 'Todos' || m.grupo === filterGroup;
                const matchesSearch = m.local.toLowerCase().includes(searchTerm) || m.visitante.toLowerCase().includes(searchTerm);
                return matchesJornada && matchesGroup && matchesSearch;
            });

            if (filtered.length === 0) {
                list.innerHTML = `
                    <div class="flex flex-col items-center justify-center py-20 bg-white rounded-[2.5rem] border border-dashed border-neutral-300 text-center px-10">
                        <i data-lucide="info" class="w-10 h-10 text-neutral-200 mb-4"></i>
                        <p class="text-neutral-400 font-bold text-lg">No hay encuentros programados</p>
                        <p class="text-neutral-300 text-sm">Este grupo no tiene partidos en esta jornada.</p>
                    </div>
                `;
            } else {
                list.innerHTML = filtered.map(m => {
                    const isLibre = m.local === 'LIBRE' || m.visitante === 'LIBRE';
                    const scoreDisplay = m.score 
                        ? `<div class="score-box bg-blue-50 border-blue-200 text-blue-700">${m.score}</div>` 
                        : `<div class="score-box text-neutral-300">VS</div>`;

                    return `
                        <div class="bg-white p-6 rounded-3xl border shadow-sm transition-all flex flex-col md:flex-row items-center gap-6 ${isLibre ? 'border-dashed border-amber-300 bg-amber-50/30' : 'border-neutral-200 hover:border-blue-400'}">
                            <div class="flex md:flex-col items-center md:items-start justify-between w-full md:w-32 gap-2 border-b md:border-b-0 md:border-r border-neutral-100 pb-3 md:pb-0 md:pr-4">
                                <span class="text-[10px] font-black uppercase text-blue-600 tracking-tighter bg-blue-50 px-2 py-1 rounded-lg truncate">${m.grupo}</span>
                                <div class="flex items-center text-neutral-400 text-xs font-bold">
                                    <i data-lucide="calendar" class="w-3.5 h-3.5 mr-1.5 text-neutral-300"></i>${m.fecha}
                                </div>
                            </div>
                            <div class="flex-1 flex items-center justify-between w-full">
                                <div class="flex-1 text-right text-base md:text-xl font-black ${isLibre && m.local === 'LIBRE' ? 'text-amber-600 italic' : 'text-neutral-800'}">${m.local}</div>
                                <div class="mx-6 flex flex-col items-center">
                                    ${scoreDisplay}
                                </div>
                                <div class="flex-1 text-left text-base md:text-xl font-black ${isLibre && m.visitante === 'LIBRE' ? 'text-amber-600 italic' : 'text-neutral-800'}">${m.visitante}</div>
                            </div>
                            <div class="flex items-center justify-end w-full md:w-40 text-neutral-500 text-sm font-bold bg-neutral-50 md:bg-transparent p-3 md:p-0 rounded-2xl">
                                <i data-lucide="map-pin" class="w-4 h-4 mr-2 text-red-400"></i>
                                ${m.sede === '-' ? '<span class="text-amber-600 italic">Descanso</span>' : m.sede}
                            </div>
                        </div>
                    `;
                }).join('');
            }
            lucide.createIcons();
        }

        window.onload = init;
    </script>
