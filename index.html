        const maxJornada = 18;
        let selectedJornada = 1;
        let filterGroup = 'Todos';
        let searchTerm = '';
        let currentView = 'calendario';

        function init() {
            renderJornadas();
            renderMatches();
            renderTablas();
            lucide.createIcons();
            document.getElementById('search-input').addEventListener('input', (e) => {
                searchTerm = e.target.value.toLowerCase();
                renderMatches();
            });
        }

        function setView(view) {
            currentView = view;
            const calView = document.getElementById('view-calendario');
            const tabView = document.getElementById('view-tablas');
            const btnCal = document.getElementById('btn-calendario');
            const btnTab = document.getElementById('btn-tablas');
            if (view === 'calendario') {
                calView.classList.remove('hidden'); tabView.classList.add('hidden');
                btnCal.classList.add('bg-white', 'shadow-sm', 'text-blue-700'); btnCal.classList.remove('text-neutral-500');
                btnTab.classList.remove('bg-white', 'shadow-sm', 'text-blue-700'); btnTab.classList.add('text-neutral-500');
            } else {
                calView.classList.add('hidden'); tabView.classList.remove('hidden');
                btnTab.classList.add('bg-white', 'shadow-sm', 'text-blue-700'); btnTab.classList.remove('text-neutral-500');
                btnCal.classList.remove('bg-white', 'shadow-sm', 'text-blue-700'); btnCal.classList.add('text-neutral-500');
                renderTablas();
            }
        }

        function changeJornada(offset) {
            const next = selectedJornada + offset;
            if (next >= 1 && next <= maxJornada) {
                setJornada(next);
                const container = document.getElementById('jornada-container');
                const activeButton = container.children[next - 1];
                if (activeButton) {
                    const scrollLeft = activeButton.offsetLeft - (container.offsetWidth / 2) + (activeButton.offsetWidth / 2);
                    container.scrollTo({ left: scrollLeft, behavior: 'smooth' });
                }
            }
        }

        function calculateStandings(group) {
            const stats = {};
            scheduleData.forEach(m => {
                if (m.grupo === group) {
                    if (m.local !== 'LIBRE' && !stats[m.local]) stats[m.local] = { equipo: m.local, pj: 0, g: 0, e: 0, p: 0, gf: 0, gc: 0, dg: 0, pts: 0 };
                    if (m.visitante !== 'LIBRE' && !stats[m.visitante]) stats[m.visitante] = { equipo: m.visitante, pj: 0, g: 0, e: 0, p: 0, gf: 0, gc: 0, dg: 0, pts: 0 };
                }
            });
            scheduleData.forEach(m => {
                if (m.grupo === group && m.score && m.local !== 'LIBRE' && m.visitante !== 'LIBRE') {
                    const [gLocal, gVisitante] = m.score.split('-').map(Number);
                    stats[m.local].pj++; stats[m.visitante].pj++;
                    stats[m.local].gf += gLocal; stats[m.local].gc += gVisitante;
                    stats[m.visitante].gf += gVisitante; stats[m.visitante].gc += gLocal;
                    if (gLocal > gVisitante) { stats[m.local].g++; stats[m.local].pts += 3; stats[m.visitante].p++; }
                    else if (gLocal < gVisitante) { stats[m.visitante].g++; stats[m.visitante].pts += 3; stats[m.local].p++; }
                    else { stats[m.local].e++; stats[m.visitante].e++; stats[m.local].pts += 1; stats[m.visitante].pts += 1; }
                }
            });
            return Object.values(stats).map(s => ({ ...s, dg: s.gf - s.gc }))
                .sort((a, b) => (b.pts - a.pts) || (b.dg - a.dg) || (b.gf - a.gf));
        }

        function renderTablas() {
            ['Centro-Occidental', 'Centro-Oriental'].forEach(group => {
                const standings = calculateStandings(group);
                const tbody = document.getElementById(group === 'Centro-Occidental' ? 'table-occidental' : 'table-oriental');
                tbody.innerHTML = standings.map((s, idx) => `
                    <tr class="border-b border-neutral-50 hover:bg-neutral-50 transition-colors text-center text-xs md:text-sm">
                        <td class="py-4 px-4 font-black text-neutral-400 text-left">${idx + 1}</td>
                        <td class="py-4 px-4 font-bold text-neutral-800 text-left">${s.equipo}</td>
                        <td class="py-4 px-2 font-medium">${s.pj}</td>
                        <td class="py-4 px-2 font-medium text-emerald-600">${s.g}</td>
                        <td class="py-4 px-2 font-medium">${s.e}</td>
                        <td class="py-4 px-2 font-medium text-rose-600">${s.p}</td>
                        <td class="py-4 px-2 font-medium">${s.gf}</td>
                        <td class="py-4 px-2 font-medium">${s.gc}</td>
                        <td class="py-4 px-2 font-black ${s.dg >= 0 ? 'text-emerald-600' : 'text-rose-600'}">${s.dg > 0 ? '+' : ''}${s.dg}</td>
                        <td class="py-4 px-4 font-black text-blue-700">${s.pts}</td>
                    </tr>
                `).join('');
            });
        }

        function renderJornadas() {
            const container = document.getElementById('jornada-container');
            const jornadas = Array.from({length: maxJornada}, (_, i) => i + 1);
            document.getElementById('btn-prev').disabled = selectedJornada === 1;
            document.getElementById('btn-next').disabled = selectedJornada === maxJornada;
            container.innerHTML = jornadas.map(j => `
                <button onclick="setJornada(${j})" class="jornada-btn px-5 py-3 rounded-2xl text-sm font-black whitespace-nowrap transition-all flex flex-col items-center min-w-[100px] ${selectedJornada === j ? 'bg-blue-600 text-white shadow-lg' : 'bg-neutral-50 text-neutral-400 border border-neutral-200'}">
                    <span class="text-[10px] uppercase opacity-60 font-black tracking-tighter">Jornada</span>
                    <span class="text-lg leading-none mt-1">${j}</span>
                </button>
            `).join('');
        }

        function setJornada(j) { selectedJornada = j; renderJornadas(); renderMatches(); }

        function setFilter(group) {
            filterGroup = group;
            document.querySelectorAll('.filter-btn').forEach(btn => {
                if(btn.dataset.group === group) { btn.classList.add('bg-neutral-800', 'text-white'); btn.classList.remove('text-neutral-500'); }
                else { btn.classList.remove('bg-neutral-800', 'text-white'); btn.classList.add('text-neutral-500'); }
            });
            renderMatches();
        }

        function renderMatches() {
            const list = document.getElementById('matches-list');
            const filtered = scheduleData.filter(m => {
                const matchesJornada = m.jornada === selectedJornada;
                const matchesGroup = filterGroup === 'Todos' || m.grupo === filterGroup;
                const matchesSearch = m.local.toLowerCase().includes(searchTerm) || m.visitante.toLowerCase().includes(searchTerm);
                return matchesJornada && matchesGroup && matchesSearch;
            });
            if (filtered.length === 0) {
                list.innerHTML = `<div class="flex flex-col items-center justify-center py-20 bg-white rounded-[2.5rem] border border-dashed border-neutral-300 text-center px-10"><i data-lucide="info" class="w-10 h-10 text-neutral-200 mb-4"></i><p class="text-neutral-400 font-bold text-lg uppercase tracking-widest">No hay encuentros programados</p></div>`;
            } else {
                list.innerHTML = filtered.map(m => {
                    const isLibre = m.local === 'LIBRE' || m.visitante === 'LIBRE';
                    const isLiveNow = m.isLive === true;
                    
                    let scoreDisplay = `<div class="score-box ${isLiveNow ? 'border-red-400 text-red-600 bg-red-50' : 'bg-blue-50 border-blue-200 text-blue-700'}">${m.score ? m.score : 'VS'}</div>`;
                    
                    // Lógica del botón de transmisión
                    let broadcastBtn = '';
                    if (!isLibre) {
                        if (isLiveNow) {
                            broadcastBtn = `<a href="${m.broadcast || '#'}" target="_blank" rel="noopener noreferrer" class="flex items-center justify-center gap-1.5 px-3 py-2 w-full bg-red-600 text-white hover:bg-red-700 rounded-xl text-[10px] font-black uppercase tracking-wider transition-colors shadow-lg shadow-red-200/50" title="Ver transmisión en vivo">
                                <span class="relative flex h-2.5 w-2.5 mr-1">
                                  <span class="animate-ping absolute inline-flex h-full w-full rounded-full bg-white opacity-75"></span>
                                  <span class="relative inline-flex rounded-full h-2.5 w-2.5 bg-white"></span>
                                </span> EN VIVO
                            </a>`;
                        } else if (m.broadcast && m.broadcast !== '') {
                            broadcastBtn = `<a href="${m.broadcast}" target="_blank" rel="noopener noreferrer" class="flex items-center justify-center gap-1.5 px-3 py-2 w-full bg-blue-50 text-blue-700 hover:bg-blue-700 hover:text-white rounded-xl text-[10px] font-black uppercase tracking-wider transition-colors border border-blue-200 hover:border-blue-700 shadow-sm" title="Ver transmisión en vivo"><i data-lucide="monitor-play" class="w-4 h-4"></i> Ver Transmisión</a>`;
                        } else {
                            broadcastBtn = `<div class="flex items-center justify-center gap-1.5 px-3 py-2 w-full bg-neutral-50 text-neutral-400 rounded-xl text-[10px] font-black uppercase tracking-wider border border-neutral-200 cursor-not-allowed" title="Sin transmisión oficial"><i data-lucide="tv-off" class="w-4 h-4"></i> No Disp.</div>`;
                        }
                    }

                    const cardBorder = isLiveNow ? 'border-red-400 shadow-md shadow-red-100 ring-2 ring-red-50' : 'border-neutral-200 hover:border-blue-400';

                    return `
                        <div class="bg-white p-6 rounded-3xl border shadow-sm transition-all flex flex-col md:flex-row items-center gap-6 ${isLibre ? 'border-dashed border-amber-300 bg-amber-50/30' : cardBorder}">
                            <div class="flex md:flex-col items-center md:items-start justify-between w-full md:w-32 gap-2 border-b md:border-b-0 md:border-r border-neutral-100 pb-3 md:pb-0 md:pr-4">
                                <span class="text-[10px] font-black uppercase text-blue-600 tracking-tighter bg-blue-50 px-2 py-1 rounded-lg truncate">${m.grupo}</span>
                                <div class="flex items-center text-neutral-400 text-xs font-bold"><i data-lucide="calendar" class="w-3.5 h-3.5 mr-1.5 text-neutral-300"></i>${m.fecha}</div>
                            </div>
                            
                            <div class="flex-1 flex items-center justify-between w-full relative">
                                <div class="flex-1 text-right text-base md:text-xl font-black ${isLibre && m.local === 'LIBRE' ? 'text-amber-600 italic' : 'text-neutral-800'}">${m.local}</div>
                                
                                <div class="mx-4 md:mx-6 flex flex-col items-center relative">
                                    ${isLiveNow ? '<span class="absolute -top-3 bg-red-600 text-white text-[8px] font-black px-2 py-0.5 rounded-full border-2 border-white shadow-sm z-10 animate-pulse">LIVE</span>' : ''}
                                    ${scoreDisplay}
                                </div>
                                
                                <div class="flex-1 text-left text-base md:text-xl font-black ${isLibre && m.visitante === 'LIBRE' ? 'text-amber-600 italic' : 'text-neutral-800'}">${m.visitante}</div>
                            </div>
                            
                            <div class="flex flex-col items-end justify-center w-full md:w-40 gap-3 border-t md:border-t-0 md:border-l border-neutral-100 pt-4 md:pt-0 md:pl-4">
                                <div class="flex items-center text-neutral-500 text-sm font-bold bg-neutral-50 md:bg-transparent px-3 py-1.5 md:p-0 rounded-xl w-full justify-center md:justify-end">
                                    <i data-lucide="map-pin" class="w-4 h-4 mr-2 text-red-400"></i>
                                    <span class="truncate">${m.sede === '-' ? '<span class="text-amber-600 italic uppercase">Descanso</span>' : m.sede}</span>
                                </div>
                                ${broadcastBtn}
                            </div>
                        </div>
                    `;
                }).join('');
            }
            lucide.createIcons();
        }

        // --- EXPORTACIÓN CON FIRMA ---
        function exportToExcel() {
            const calData = scheduleData.map(m => ({ JORNADA: m.jornada, GRUPO: m.grupo, LOCAL: m.local, SCORE: m.score || 'VS', VISITANTE: m.visitante, SEDE: m.sede === '-' ? 'Descanso' : m.sede, FECHA: m.fecha }));
            const standingsOcc = calculateStandings('Centro-Occidental').map((s, i) => ({ POS: i + 1, EQUIPO: s.equipo, PJ: s.pj, G: s.g, E: s.e, P: s.p, GF: s.gf, GC: s.gc, DG: s.dg, PTS: s.pts }));
            const standingsOri = calculateStandings('Centro-Oriental').map((s, i) => ({ POS: i + 1, EQUIPO: s.equipo, PJ: s.pj, G: s.g, E: s.e, P: s.p, GF: s.gf, GC: s.gc, DG: s.dg, PTS: s.pts }));
            
            const wb = XLSX.utils.book_new();
            
            const wsCal = XLSX.utils.json_to_sheet(calData);
            XLSX.utils.sheet_add_aoa(wsCal, [[""], ["Reporte generado por ditt0tech - Todos los derechos reservados"]], { origin: -1 });
            wsCal['!cols'] = [{wch:10}, {wch:20}, {wch:25}, {wch:10}, {wch:25}, {wch:20}, {wch:15}];
            XLSX.utils.book_append_sheet(wb, wsCal, "Calendario");

            const wsOcc = XLSX.utils.json_to_sheet(standingsOcc);
            wsOcc['!cols'] = [{wch:5}, {wch:25}, {wch:5}, {wch:5}, {wch:5}, {wch:5}, {wch:5}, {wch:5}, {wch:5}, {wch:8}];
            XLSX.utils.sheet_add_aoa(wsOcc, [[""], ["Reporte generado por ditt0tech - Todos los derechos reservados"]], { origin: -1 });
            XLSX.utils.book_append_sheet(wb, wsOcc, "Posiciones OCC");

            const wsOri = XLSX.utils.json_to_sheet(standingsOri);
            wsOri['!cols'] = [{wch:5}, {wch:25}, {wch:5}, {wch:5}, {wch:5}, {wch:5}, {wch:5}, {wch:5}, {wch:5}, {wch:8}];
            XLSX.utils.sheet_add_aoa(wsOri, [[""], ["Reporte generado por ditt0tech - Todos los derechos reservados"]], { origin: -1 });
            XLSX.utils.book_append_sheet(wb, wsOri, "Posiciones ORI");

            XLSX.writeFile(wb, "Reporte_FUTVE_2_2026_ditt0tech.xlsx");
        }

        async function exportToPDF() {
            const { jsPDF } = window.jspdf; const doc = new jsPDF();
            
            doc.setFontSize(22); doc.setTextColor(29, 78, 216); doc.text("LIGA FUTVE 2 - REPORTE 2026", 14, 20);
            doc.setFontSize(10); doc.setTextColor(150); doc.text("Powered by ditt0tech", 14, 28);
            
            const occidental = calculateStandings('Centro-Occidental');
            doc.setFontSize(14); doc.setTextColor(245, 158, 11); doc.text("GRUPO CENTRO-OCCIDENTAL", 14, 40);
            doc.autoTable({ startY: 45, head: [['#', 'Equipo', 'PJ', 'G', 'E', 'P', 'GF', 'GC', 'DG', 'PTS']], body: occidental.map((s, i) => [i + 1, s.equipo, s.pj, s.g, s.e, s.p, s.gf, s.gc, s.dg, s.pts]), headStyles: { fillColor: [245, 158, 11] }, styles: { fontSize: 9 } });
            
            const oriental = calculateStandings('Centro-Oriental');
            doc.setTextColor(29, 78, 216); doc.text("GRUPO CENTRO-ORIENTAL", 14, doc.lastAutoTable.finalY + 15);
            doc.autoTable({ startY: doc.lastAutoTable.finalY + 20, head: [['#', 'Equipo', 'PJ', 'G', 'E', 'P', 'GF', 'GC', 'DG', 'PTS']], body: oriental.map((s, i) => [i + 1, s.equipo, s.pj, s.g, s.e, s.p, s.gf, s.gc, s.dg, s.pts]), headStyles: { fillColor: [29, 78, 216] }, styles: { fontSize: 9 } });
            
            doc.setFontSize(8); doc.setTextColor(150); doc.text("© 2026 ditt0tech - Todos los derechos reservados", 14, doc.internal.pageSize.height - 10);

            doc.addPage(); 
            doc.setFontSize(18); doc.setTextColor(51); doc.text("FIXTURE COMPLETO", 14, 20);
            doc.autoTable({ startY: 25, head: [['Jor.', 'Grupo', 'Local', 'Score', 'Visitante', 'Sede', 'Fecha']], body: scheduleData.map(m => [m.jornada, m.grupo, m.local, m.score || 'VS', m.visitante, m.sede, m.fecha]), headStyles: { fillColor: [51, 65, 85] }, styles: { fontSize: 8 } });
            
            doc.setFontSize(8); doc.setTextColor(150); doc.text("© 2026 ditt0tech - Todos los derechos reservados", 14, doc.internal.pageSize.height - 10);
            
            doc.save("Reporte_Oficial_FUTVE_2_ditt0tech.pdf");
        }

        window.onload = init;
    </script>
