    <script>
        // MECANISMOS DE PROTECCIÓN DISUASORIA
        // 1. Deshabilitar Clic Derecho
        document.addEventListener('contextmenu', event => event.preventDefault());

        // 2. Bloquear combinaciones de teclas comunes de inspección
        document.onkeydown = function(e) {
            // Deshabilitar F12
            if (e.keyCode == 123) return false;
            // Deshabilitar Ctrl+Shift+I (Inspeccionar)
            if (e.ctrlKey && e.shiftKey && e.keyCode == 'I'.charCodeAt(0)) return false;
            // Deshabilitar Ctrl+Shift+C (Inspeccionar elemento)
            if (e.ctrlKey && e.shiftKey && e.keyCode == 'C'.charCodeAt(0)) return false;
            // Deshabilitar Ctrl+Shift+J (Consola)
            if (e.ctrlKey && e.shiftKey && e.keyCode == 'J'.charCodeAt(0)) return false;
            // Deshabilitar Ctrl+U (Ver código fuente)
            if (e.ctrlKey && e.keyCode == 'U'.charCodeAt(0)) return false;
        };

        const scheduleData = [
            // JORNADA 1
            { jornada: 1, grupo: 'Centro-Oriental', local: 'Bolívar', visitante: 'Mineros', sede: 'Ciudad Bolívar', fecha: '28 Feb', score: '1-0' },

            { jornada: 1, grupo: 'Centro-Oriental', local: 'Miranda', visitante: 'Aragua', sede: 'Caracas', fecha: '01 Mar', score: '1-0' },

            { jornada: 1, grupo: 'Centro-Occidental', local: 'Deportivo Lara', visitante: 'Atlético Barinas', sede: 'Cabudare', fecha: '22 Feb', score: '1-0' },
            { jornada: 1, grupo: 'Centro-Occidental', local: 'Yaracuyanos', visitante: 'El Vigía', sede: 'San Felipe', fecha: '22 Feb', score: '2-0' },
            { jornada: 1, grupo: 'Centro-Occidental', local: 'LIBRE', visitante: 'Zamora - B', sede: '-', fecha: '21 Feb', score: null },

            // JORNADA 2
            { jornada: 2, grupo: 'Centro-Oriental', local: 'Mineros', visitante: 'Dynamo Puerto', sede: 'Puerto Ordaz', fecha: '07 Mar', score: '1-3' },
            { jornada: 2, grupo: 'Centro-Oriental', local: 'Monagas - B', visitante: 'Marítimo La Guaira', sede: 'Maturín', fecha: '07 Mar', score: '1-0' },
            { jornada: 2, grupo: 'Centro-Oriental', local: 'Atlético Ávila', visitante: 'Miranda', sede: 'Caracas', fecha: '08 Mar', score: '0-2' },
            { jornada: 2, grupo: 'Centro-Oriental', local: 'Aragua', visitante: 'Bolívar', sede: 'Maracay', fecha: '07 Mar', score: '2-1' },
            { jornada: 2, grupo: 'Centro-Occidental', local: 'El Vigía', visitante: 'Deportivo Lara', sede: 'El Vigía', fecha: '01 Mar', score: '2-2' },
            { jornada: 2, grupo: 'Centro-Occidental', local: 'Atlético Barinas', visitante: 'Real Frontera', sede: 'Barinas', fecha: '01 Mar', score: '1-2' },
            { jornada: 2, grupo: 'Centro-Occidental', local: 'Ureña', visitante: 'Puerto Cabello - B', sede: 'Ureña', fecha: '01 Mar', score: '1-1' },
            { jornada: 2, grupo: 'Centro-Occidental', local: 'Barquisimeto', visitante: 'Zamora - B', sede: 'Barquisimeto', fecha: '01 Mar', score: '1-1' },
            { jornada: 2, grupo: 'Centro-Occidental', local: 'LIBRE', visitante: 'Yaracuyanos', sede: '-', fecha: '01 Mar', score: null },

            // JORNADA 3
            { jornada: 3, grupo: 'Centro-Oriental', local: 'Bolívar', visitante: 'Dynamo Puerto', sede: 'Ciudad Bolívar', fecha: '15 Mar', score: '1-0' },
            { jornada: 3, grupo: 'Centro-Oriental', local: 'Mineros', visitante: 'Monagas - B', sede: 'Puerto Ordaz', fecha: '14 Mar', score: '1-2' },
            { jornada: 3, grupo: 'Centro-Oriental', local: 'Marítimo La Guaira', visitante: 'Miranda', sede: 'La Guaira', fecha: '14 Mar', score: '1-1' },
            { jornada: 3, grupo: 'Centro-Oriental', local: 'Atlético Ávila', visitante: 'Aragua', sede: 'Caracas', fecha: '15 Mar', score: '0-0' },
            { jornada: 3, grupo: 'Centro-Occidental', local: 'Zamora - B', visitante: 'Ureña', sede: 'Barinas', fecha: '08 Mar', score: '1-2' },
            { jornada: 3, grupo: 'Centro-Occidental', local: 'Puerto Cabello - B', visitante: 'Atlético Barinas', sede: 'Puerto Cabello', fecha: '08 Mar', score: '1-2' },
            { jornada: 3, grupo: 'Centro-Occidental', local: 'Real Frontera', visitante: 'El Vigía', sede: 'San Cristóbal', fecha: '07 Mar', score: '3-1' },
            { jornada: 3, grupo: 'Centro-Occidental', local: 'Deportivo Lara', visitante: 'Yaracuyanos', sede: 'Cabudare', fecha: '07 Mar', score: '1-1' },
            { jornada: 3, grupo: 'Centro-Occidental', local: 'LIBRE', visitante: 'Barquisimeto', sede: '-', fecha: '07 Mar', score: null },

            // JORNADA 4
            { jornada: 4, grupo: 'Centro-Occidental', local: 'Yaracuyanos', visitante: 'Real Frontera', sede: 'San Felipe', fecha: '14 Mar', score: '2-1' },
            { jornada: 4, grupo: 'Centro-Occidental', local: 'El Vigía', visitante: 'Puerto Cabello - B', sede: 'El Vigía', fecha: '14 Mar', score: '1-4' },
            { jornada: 4, grupo: 'Centro-Occidental', local: 'Atlético Barinas', visitante: 'Zamora - B', sede: 'Barinas', fecha: '15 Mar', score: '2-2' },
            { jornada: 4, grupo: 'Centro-Occidental', local: 'Ureña', visitante: 'Barquisimeto', sede: 'Ureña', fecha: '15 Mar', score: '1-2' },
            { jornada: 4, grupo: 'Centro-Occidental', local: 'LIBRE', visitante: 'Deportivo Lara', sede: '-', fecha: '14 Mar', score: null },

            // JORNADAS RESTANTES (14-18)
            { jornada: 14, grupo: 'Centro-Occidental', local: 'Atlético Barinas', visitante: 'Barquisimeto', sede: 'Barinas', fecha: 'S/D', score: null },
            { jornada: 15, grupo: 'Centro-Occidental', local: 'Puerto Cabello - B', visitante: 'Deportivo Lara', sede: 'Puerto Cabello', fecha: 'S/D', score: null },
            { jornada: 16, grupo: 'Centro-Occidental', local: 'El Vigía', visitante: 'Ureña', sede: 'El Vigía', fecha: 'S/D', score: null },
            { jornada: 17, grupo: 'Centro-Occidental', local: 'Zamora - B', visitante: 'Real Frontera', sede: 'Barinas', fecha: 'S/D', score: null },
            { jornada: 18, grupo: 'Centro-Occidental', local: 'Yaracuyanos', visitante: 'Atlético Barinas', sede: 'San Felipe', fecha: 'S/D', score: null },
            { jornada: 18, grupo: 'Centro-Occidental', local: 'Deportivo Lara', visitante: 'Ureña', sede: 'Cabudare', fecha: 'S/D', score: null },
            { jornada: 18, grupo: 'Centro-Occidental', local: 'Real Frontera', visitante: 'Barquisimeto', sede: 'San Cristóbal', fecha: 'S/D', score: null },
            { jornada: 18, grupo: 'Centro-Occidental', local: 'Puerto Cabello - B', visitante: 'Zamora - B', sede: 'Puerto Cabello', fecha: 'S/D', score: null },
            { jornada: 18, grupo: 'Centro-Occidental', local: 'LIBRE', visitante: 'El Vigía', sede: '-', fecha: 'S/D', score: null }
        ];

        const maxJornada = 18;
        let selectedJornada = 1;
        let filterGroup = 'Todos';
        let searchTerm = '';
        let currentView = 'calendario';

        function init() {
            renderJornadas();
            renderMatches();
            renderTablas();
            lucide.createIcons();
            document.getElementById('search-input').addEventListener('input', (e) => {
                searchTerm = e.target.value.toLowerCase();
                renderMatches();
            });
        }

        function setView(view) {
            currentView = view;
            const calView = document.getElementById('view-calendario');
            const tabView = document.getElementById('view-tablas');
            const btnCal = document.getElementById('btn-calendario');
            const btnTab = document.getElementById('btn-tablas');

            if (view === 'calendario') {
                calView.classList.remove('hidden'); tabView.classList.add('hidden');
                btnCal.classList.add('bg-white', 'shadow-sm', 'text-blue-700'); btnCal.classList.remove('text-neutral-500');
                btnTab.classList.remove('bg-white', 'shadow-sm', 'text-blue-700'); btnTab.classList.add('text-neutral-500');
            } else {
                calView.classList.add('hidden'); tabView.classList.remove('hidden');
                btnTab.classList.add('bg-white', 'shadow-sm', 'text-blue-700'); btnTab.classList.remove('text-neutral-500');
                btnCal.classList.remove('bg-white', 'shadow-sm', 'text-blue-700'); btnCal.classList.add('text-neutral-500');
                renderTablas();
            }
        }

        function changeJornada(offset) {
            const next = selectedJornada + offset;
            if (next >= 1 && next <= maxJornada) {
                setJornada(next);
                const container = document.getElementById('jornada-container');
                const activeButton = container.children[next - 1];
                if (activeButton) {
                    const scrollLeft = activeButton.offsetLeft - (container.offsetWidth / 2) + (activeButton.offsetWidth / 2);
                    container.scrollTo({ left: scrollLeft, behavior: 'smooth' });
                }
            }
        }

        function calculateStandings(group) {
            const stats = {};
            scheduleData.forEach(m => {
                if (m.grupo === group) {
                    if (m.local !== 'LIBRE' && !stats[m.local]) stats[m.local] = { equipo: m.local, pj: 0, g: 0, e: 0, p: 0, gf: 0, gc: 0, dg: 0, pts: 0 };
                    if (m.visitante !== 'LIBRE' && !stats[m.visitante]) stats[m.visitante] = { equipo: m.visitante, pj: 0, g: 0, e: 0, p: 0, gf: 0, gc: 0, dg: 0, pts: 0 };
                }
            });

            scheduleData.forEach(m => {
                if (m.grupo === group && m.score && m.local !== 'LIBRE' && m.visitante !== 'LIBRE') {
                    const [gLocal, gVisitante] = m.score.split('-').map(Number);
                    stats[m.local].pj++; stats[m.visitante].pj++;
                    stats[m.local].gf += gLocal; stats[m.local].gc += gVisitante;
                    stats[m.visitante].gf += gVisitante; stats[m.visitante].gc += gLocal;
                    if (gLocal > gVisitante) { stats[m.local].g++; stats[m.local].pts += 3; stats[m.visitante].p++; }
                    else if (gLocal < gVisitante) { stats[m.visitante].g++; stats[m.visitante].pts += 3; stats[m.local].p++; }
                    else { stats[m.local].e++; stats[m.visitante].e++; stats[m.local].pts += 1; stats[m.visitante].pts += 1; }
                }
            });

            return Object.values(stats).map(s => ({ ...s, dg: s.gf - s.gc }))
                .sort((a, b) => (b.pts - a.pts) || (b.dg - a.dg) || (b.gf - a.gf));
        }

        function renderTablas() {
            ['Centro-Occidental', 'Centro-Oriental'].forEach(group => {
                const standings = calculateStandings(group);
                const tbody = document.getElementById(group === 'Centro-Occidental' ? 'table-occidental' : 'table-oriental');
                tbody.innerHTML = standings.map((s, idx) => `
                    <tr class="border-b border-neutral-50 hover:bg-neutral-50 transition-colors text-center text-xs md:text-sm">
                        <td class="py-4 px-4 font-black text-neutral-400 text-left">${idx + 1}</td>
                        <td class="py-4 px-4 font-bold text-neutral-800 text-left">${s.equipo}</td>
                        <td class="py-4 px-2 font-medium">${s.pj}</td>
                        <td class="py-4 px-2 font-medium text-emerald-600">${s.g}</td>
                        <td class="py-4 px-2 font-medium">${s.e}</td>
                        <td class="py-4 px-2 font-medium text-rose-600">${s.p}</td>
                        <td class="py-4 px-2 font-medium">${s.gf}</td>
                        <td class="py-4 px-2 font-medium">${s.gc}</td>
                        <td class="py-4 px-2 font-black ${s.dg >= 0 ? 'text-emerald-600' : 'text-rose-600'}">${s.dg > 0 ? '+' : ''}${s.dg}</td>
                        <td class="py-4 px-4 font-black text-blue-700">${s.pts}</td>
                    </tr>
                `).join('');
            });
        }

        function renderJornadas() {
            const container = document.getElementById('jornada-container');
            const jornadas = Array.from({length: maxJornada}, (_, i) => i + 1);
            document.getElementById('btn-prev').disabled = selectedJornada === 1;
            document.getElementById('btn-next').disabled = selectedJornada === maxJornada;
            container.innerHTML = jornadas.map(j => `
                <button onclick="setJornada(${j})" class="jornada-btn px-5 py-3 rounded-2xl text-sm font-black whitespace-nowrap transition-all flex flex-col items-center min-w-[100px] ${selectedJornada === j ? 'bg-blue-600 text-white shadow-lg' : 'bg-neutral-50 text-neutral-400 border border-neutral-200'}">
                    <span class="text-[10px] uppercase opacity-60 font-black tracking-tighter">Jornada</span>
                    <span class="text-lg leading-none mt-1">${j}</span>
                </button>
            `).join('');
        }

        function setJornada(j) { selectedJornada = j; renderJornadas(); renderMatches(); }

        function setFilter(group) {
            filterGroup = group;
            document.querySelectorAll('.filter-btn').forEach(btn => {
                if(btn.dataset.group === group) { btn.classList.add('bg-neutral-800', 'text-white'); btn.classList.remove('text-neutral-500'); }
                else { btn.classList.remove('bg-neutral-800', 'text-white'); btn.classList.add('text-neutral-500'); }
            });
            renderMatches();
        }

        function renderMatches() {
            const list = document.getElementById('matches-list');
            const filtered = scheduleData.filter(m => {
                const matchesJornada = m.jornada === selectedJornada;
                const matchesGroup = filterGroup === 'Todos' || m.grupo === filterGroup;
                const matchesSearch = m.local.toLowerCase().includes(searchTerm) || m.visitante.toLowerCase().includes(searchTerm);
                return matchesJornada && matchesGroup && matchesSearch;
            });

            if (filtered.length === 0) {
                list.innerHTML = `<div class="flex flex-col items-center justify-center py-20 bg-white rounded-[2.5rem] border border-dashed border-neutral-300 text-center px-10"><i data-lucide="info" class="w-10 h-10 text-neutral-200 mb-4"></i><p class="text-neutral-400 font-bold text-lg uppercase">No hay encuentros programados</p></div>`;
            } else {
                list.innerHTML = filtered.map(m => {
                    const isLibre = m.local === 'LIBRE' || m.visitante === 'LIBRE';
                    const scoreDisplay = m.score ? `<div class="score-box bg-blue-50 border-blue-200 text-blue-700">${m.score}</div>` : `<div class="score-box text-neutral-300">VS</div>`;
                    return `
                        <div class="bg-white p-6 rounded-3xl border shadow-sm transition-all flex flex-col md:flex-row items-center gap-6 ${isLibre ? 'border-dashed border-amber-300 bg-amber-50/30' : 'border-neutral-200 hover:border-blue-400'}">
                            <div class="flex md:flex-col items-center md:items-start justify-between w-full md:w-32 gap-2 border-b md:border-b-0 md:border-r border-neutral-100 pb-3 md:pb-0 md:pr-4">
                                <span class="text-[10px] font-black uppercase text-blue-600 tracking-tighter bg-blue-50 px-2 py-1 rounded-lg truncate">${m.grupo}</span>
                                <div class="flex items-center text-neutral-400 text-xs font-bold"><i data-lucide="calendar" class="w-3.5 h-3.5 mr-1.5 text-neutral-300"></i>${m.fecha}</div>
                            </div>
                            <div class="flex-1 flex items-center justify-between w-full">
                                <div class="flex-1 text-right text-base md:text-xl font-black ${isLibre && m.local === 'LIBRE' ? 'text-amber-600 italic' : 'text-neutral-800'}">${m.local}</div>
                                <div class="mx-6 flex flex-col items-center">${scoreDisplay}</div>
                                <div class="flex-1 text-left text-base md:text-xl font-black ${isLibre && m.visitante === 'LIBRE' ? 'text-amber-600 italic' : 'text-neutral-800'}">${m.visitante}</div>
                            </div>
                            <div class="flex items-center justify-end w-full md:w-40 text-neutral-500 text-sm font-bold bg-neutral-50 md:bg-transparent p-3 md:p-0 rounded-2xl">
                                <i data-lucide="map-pin" class="w-4 h-4 mr-2 text-red-400"></i>${m.sede === '-' ? '<span class="text-amber-600 italic uppercase">Descanso</span>' : m.sede}
                            </div>
                        </div>
                    `;
                }).join('');
            }
            lucide.createIcons();
        }

        // --- EXPORTACIÓN ---
        function exportToExcel() {
            const calData = scheduleData.map(m => ({ JORNADA: m.jornada, GRUPO: m.grupo, LOCAL: m.local, SCORE: m.score || 'VS', VISITANTE: m.visitante, SEDE: m.sede === '-' ? 'Descanso' : m.sede, FECHA: m.fecha }));
            const standingsOcc = calculateStandings('Centro-Occidental').map((s, i) => ({ POS: i + 1, EQUIPO: s.equipo, PJ: s.pj, G: s.g, E: s.e, P: s.p, GF: s.gf, GC: s.gc, DG: s.dg, PTS: s.pts }));
            const standingsOri = calculateStandings('Centro-Oriental').map((s, i) => ({ POS: i + 1, EQUIPO: s.equipo, PJ: s.pj, G: s.g, E: s.e, P: s.p, GF: s.gf, GC: s.gc, DG: s.dg, PTS: s.pts }));
            const wb = XLSX.utils.book_new();
            const wsCal = XLSX.utils.json_to_sheet(calData); wsCal['!cols'] = [{wch:10}, {wch:20}, {wch:25}, {wch:10}, {wch:25}, {wch:20}, {wch:15}]; XLSX.utils.book_append_sheet(wb, wsCal, "Calendario");
            const wsOcc = XLSX.utils.json_to_sheet(standingsOcc); XLSX.utils.book_append_sheet(wb, wsOcc, "Posiciones OCC");
            const wsOri = XLSX.utils.json_to_sheet(standingsOri); XLSX.utils.book_append_sheet(wb, wsOri, "Posiciones ORI");
            XLSX.writeFile(wb, "Reporte_FUTVE_2_2026.xlsx");
        }

        async function exportToPDF() {
            const { jsPDF } = window.jspdf; const doc = new jsPDF();
            const occidental = calculateStandings('Centro-Occidental'); const oriental = calculateStandings('Centro-Oriental');
            doc.setFontSize(22); doc.setTextColor(29, 78, 216); doc.text("LIGA FUTVE 2 - REPORTE 2026", 14, 20);
            doc.setFontSize(14); doc.setTextColor(245, 158, 11); doc.text("GRUPO CENTRO-OCCIDENTAL", 14, 40);
            doc.autoTable({ startY: 45, head: [['#', 'Equipo', 'PJ', 'G', 'E', 'P', 'GF', 'GC', 'DG', 'PTS']], body: occidental.map((s, i) => [i + 1, s.equipo, s.pj, s.g, s.e, s.p, s.gf, s.gc, s.dg, s.pts]), headStyles: { fillColor: [245, 158, 11] } });
            doc.setTextColor(29, 78, 216); doc.text("GRUPO CENTRO-ORIENTAL", 14, doc.lastAutoTable.finalY + 15);
            doc.autoTable({ startY: doc.lastAutoTable.finalY + 20, head: [['#', 'Equipo', 'PJ', 'G', 'E', 'P', 'GF', 'GC', 'DG', 'PTS']], body: oriental.map((s, i) => [i + 1, s.equipo, s.pj, s.g, s.e, s.p, s.gf, s.gc, s.dg, s.pts]), headStyles: { fillColor: [29, 78, 216] } });
            doc.addPage(); doc.setFontSize(18); doc.setTextColor(51); doc.text("FIXTURE COMPLETO", 14, 20);
            doc.autoTable({ startY: 25, head: [['Jor.', 'Grupo', 'Local', 'Score', 'Visitante', 'Sede', 'Fecha']], body: scheduleData.map(m => [m.jornada, m.grupo, m.local, m.score || 'VS', m.visitante, m.sede, m.fecha]), headStyles: { fillColor: [51, 65, 85] }, styles: { fontSize: 8 } });
            doc.save("Reporte_Oficial_FUTVE_2.pdf");
        }

        window.onload = init;
    </script>
</body>
</html>
