            currentView = view;
            const calView = document.getElementById('view-calendario');
            const tabView = document.getElementById('view-tablas');
            const btnCal = document.getElementById('btn-calendario');
            const btnTab = document.getElementById('btn-tablas');

            if (view === 'calendario') {
                calView.classList.remove('hidden');
                tabView.classList.add('hidden');
                btnCal.classList.add('bg-white', 'shadow-sm', 'text-blue-700');
                btnCal.classList.remove('text-neutral-500');
                btnTab.classList.remove('bg-white', 'shadow-sm', 'text-blue-700');
                btnTab.classList.add('text-neutral-500');
            } else {
                calView.classList.add('hidden');
                tabView.classList.remove('hidden');
                btnTab.classList.add('bg-white', 'shadow-sm', 'text-blue-700');
                btnTab.classList.remove('text-neutral-500');
                btnCal.classList.remove('bg-white', 'shadow-sm', 'text-blue-700');
                btnCal.classList.add('text-neutral-500');
                renderTablas();
            }

        function handleSlider(val) {
            selectedJornada = parseInt(val);

        function calculateStandings(group) {
            const stats = {};
            scheduleData.forEach(m => {
                if (m.grupo === group) {
                    if (m.local !== 'LIBRE' && !stats[m.local]) stats[m.local] = { equipo: m.local, pj: 0, g: 0, e: 0, p: 0, gf: 0, gc: 0, dg: 0, pts: 0 };
                    if (m.visitante !== 'LIBRE' && !stats[m.visitante]) stats[m.visitante] = { equipo: m.visitante, pj: 0, g: 0, e: 0, p: 0, gf: 0, gc: 0, dg: 0, pts: 0 };
                }
            });

            scheduleData.forEach(m => {
                if (m.grupo === group && m.score && m.local !== 'LIBRE' && m.visitante !== 'LIBRE') {
                    const [gLocal, gVisitante] = m.score.split('-').map(Number);
                    stats[m.local].pj++; stats[m.visitante].pj++;
                    stats[m.local].gf += gLocal; stats[m.local].gc += gVisitante;
                    stats[m.visitante].gf += gVisitante; stats[m.visitante].gc += gLocal;
                    if (gLocal > gVisitante) { stats[m.local].g++; stats[m.local].pts += 3; stats[m.visitante].p++; }
                    else if (gLocal < gVisitante) { stats[m.visitante].g++; stats[m.visitante].pts += 3; stats[m.local].p++; }
                    else { stats[m.local].e++; stats[m.visitante].e++; stats[m.local].pts += 1; stats[m.visitante].pts += 1; }
                }
            });

            return Object.values(stats).map(s => ({ ...s, dg: s.gf - s.gc }))
                .sort((a, b) => (b.pts - a.pts) || (b.dg - a.dg) || (b.gf - a.gf));
        }

        function renderTablas() {
            ['Centro-Occidental', 'Centro-Oriental'].forEach(group => {
                const standings = calculateStandings(group);
                const tbody = document.getElementById(group === 'Centro-Occidental' ? 'table-occidental' : 'table-oriental');
                tbody.innerHTML = standings.map((s, idx) => `
                    <tr class="border-b border-neutral-50 hover:bg-neutral-50 transition-colors text-center">
                        <td class="py-4 px-4 font-black text-neutral-400 text-xs text-left">${idx + 1}</td>

                        <td class="py-4 px-2 text-sm font-medium">${s.pj}</td>
                        <td class="py-4 px-2 text-sm font-medium">${s.g}</td>
                        <td class="py-4 px-2 text-sm font-medium">${s.e}</td>
                        <td class="py-4 px-2 text-sm font-medium">${s.p}</td>
                        <td class="py-4 px-2 text-sm font-medium">${s.gf}</td>
                        <td class="py-4 px-2 text-sm font-medium">${s.gc}</td>
                        <td class="py-4 px-2 text-sm font-black ${s.dg >= 0 ? 'text-emerald-600' : 'text-rose-600'}">${s.dg > 0 ? '+' : ''}${s.dg}</td>
                        <td class="py-4 px-4 font-black text-blue-700">${s.pts}</td>
                    </tr>
                `).join('');
            });
        }

        function renderJornadas() {
            const container = document.getElementById('jornada-container');
            const jornadas = [...new Set(scheduleData.map(d => d.jornada))].sort((a,b) => a-b);
            
            const slider = document.getElementById('jornada-slider');
            if(slider && parseInt(slider.value) !== selectedJornada) {
                slider.value = selectedJornada;
                document.getElementById('slider-label').innerText = `Jornada ${selectedJornada}`;
            }

            container.innerHTML = jornadas.map(j => `
                <button onclick="setJornada(${j})" class="jornada-btn px-5 py-2.5 rounded-xl text-sm font-black whitespace-nowrap transition-all flex flex-col items-center min-w-[90px] ${selectedJornada === j ? 'bg-blue-600 text-white shadow-lg shadow-blue-200 -translate-y-1' : 'bg-white text-neutral-500 border border-neutral-200 hover:border-blue-300'}">
                    <span class="text-[10px] uppercase opacity-60 font-black tracking-tighter">Jornada</span><span class="text-lg leading-none mt-1">${j}</span>
                </button>
            `).join('');
        }

        function setJornada(j) { selectedJornada = j; renderJornadas(); renderMatches(); }

        function setFilter(group) {
            filterGroup = group;
            document.querySelectorAll('.filter-btn').forEach(btn => {
                if(btn.dataset.group === group) { btn.classList.add('bg-neutral-800', 'text-white'); btn.classList.remove('text-neutral-500'); }
                else { btn.classList.remove('bg-neutral-800', 'text-white'); btn.classList.add('text-neutral-500'); }
            });
            renderMatches();
        }

        function renderMatches() {
            const list = document.getElementById('matches-list');
            const filtered = scheduleData.filter(m => {
                const matchesJornada = m.jornada === selectedJornada;
                const matchesGroup = filterGroup === 'Todos' || m.grupo === filterGroup;
                const matchesSearch = m.local.toLowerCase().includes(searchTerm) || m.visitante.toLowerCase().includes(searchTerm);
                return matchesJornada && matchesGroup && matchesSearch;
            });

            if (filtered.length === 0) {
                list.innerHTML = `<div class="flex flex-col items-center justify-center py-20 bg-white rounded-[2.5rem] border border-dashed border-neutral-300 text-center px-10"><i data-lucide="info" class="w-10 h-10 text-neutral-200 mb-4"></i><p class="text-neutral-400 font-bold text-lg">No hay encuentros programados</p></div>`;
            } else {
                list.innerHTML = filtered.map(m => {
                    const isLibre = m.local === 'LIBRE' || m.visitante === 'LIBRE';
                    const scoreDisplay = m.score ? `<div class="score-box bg-blue-50 border-blue-200 text-blue-700">${m.score}</div>` : `<div class="score-box text-neutral-300">VS</div>`;
                    return `
                        <div class="bg-white p-6 rounded-3xl border shadow-sm transition-all flex flex-col md:flex-row items-center gap-6 ${isLibre ? 'border-dashed border-amber-300 bg-amber-50/30' : 'border-neutral-200 hover:border-blue-400'}">

                                <span class="text-[10px] font-black uppercase text-blue-600 tracking-tighter bg-blue-50 px-2 py-1 rounded-lg truncate">${m.grupo}</span>
                                <div class="flex items-center text-neutral-400 text-xs font-bold"><i data-lucide="calendar" class="w-3.5 h-3.5 mr-1.5 text-neutral-300"></i>${m.fecha}</div>
                            </div>
                            <div class="flex-1 flex items-center justify-between w-full">
                                <div class="flex-1 text-right text-base md:text-xl font-black ${isLibre && m.local === 'LIBRE' ? 'text-amber-600 italic' : 'text-neutral-800'}">${m.local}</div>
                                <div class="mx-6 flex flex-col items-center">${scoreDisplay}</div>
                                <div class="flex-1 text-left text-base md:text-xl font-black ${isLibre && m.visitante === 'LIBRE' ? 'text-amber-600 italic' : 'text-neutral-800'}">${m.visitante}</div>
                            </div>
                            <div class="flex items-center justify-end w-full md:w-40 text-neutral-500 text-sm font-bold bg-neutral-50 md:bg-transparent p-3 md:p-0 rounded-2xl">
                                <i data-lucide="map-pin" class="w-4 h-4 mr-2 text-red-400"></i>${m.sede === '-' ? '<span class="text-amber-600 italic">Descanso</span>' : m.sede}
                            </div>
                        </div>
                    `;
                }).join('');
            }
            lucide.createIcons();
        }
        window.onload = init;
